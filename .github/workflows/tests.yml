name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Realness check (no fabricated data in product paths)
        run: bash scripts/check_no_demo.sh
      - name: Tests
        run: pytest tests/ -x -q --tb=short
# CI uses committed result JSONs + synthetic fixtures only. Data-dependent tests
# skip automatically when data/cascade/raw/ is absent (see tests/conftest.py).
